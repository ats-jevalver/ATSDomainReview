version: "3.8"

services:
  app:
    image: ats-domain-review:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - app-static:/app/static
    environment:
      - DATABASE_URL=postgresql://atsdomainreview:JESR2vf0yBdMoQajyLICVFrWr@10.10.10.20:5432/ats_domain_review
      - ATS_STATIC_DIR=/app/static
      # Uncomment and set these for Azure AD SSO:
      # - AZURE_CLIENT_ID=
      # - AZURE_TENANT_ID=
      # - AZURE_CLIENT_SECRET=
      # Uncomment to customise branding:
      # - ATS_COMPANY_NAME=My Company
      # - ATS_PRIMARY_COLOR=#1a365d
      # - ATS_ACCENT_COLOR=#2b6cb0
      # - ATS_FOOTER_TEXT=Confidential
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

volumes:
  app-static:
